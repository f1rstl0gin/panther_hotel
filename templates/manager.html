<!DOCTYPE html>
<html lang = "en">
<head>
    <meta charset = "UTF-8">
    <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
    <title>Manager</title>
    <link href = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel = "stylesheet">
    <style>
        body {
            background-color: #f5f0e1;
            color: #4b3621;
            font-family: Arial, sans-serif;
        }
        /*center the page's contents*/
        .container {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            margin-bottom: 30px;
        }

        table {
            width: 90%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }
        /*fix spacing to be easier to read*/
        th, td {
            padding: 12px 15px;
            text-align: center;
            border: 1px solid #4b3621;
        }

        a.btn {
            margin-top: 20px;
            padding: 10px 25px;
            font-size: 1rem;
            border-radius: 8px;
            background-color: #4b3621;
            color: #f5f0e1;
            border: none;
            text-decoration: none;
            display: inline-block;
        }

        a.btn:hover {
            background-color: #6b4f31;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class = "container">
        <h2>Reservation List</h2>
        <!--Creates table with headers to be filled-->
        <table class = "table">
            <tr>
                <th>Name</th>
                <th>Check-in Date</th>
                <th>Check-out Date</th>
                <th>Room Type</th>
            </tr>
            <!--Iterates through all reservations in the db to display-->
            {% for r in reservations %}
            <tr>
                <td>{{ r.name }}</td>
                <td>{{ r.checkin_date }}</td>
                <td>{{ r.checkout_date }}</td>
                <td>{{ r.room_type }}</td>
            </tr>
            {% endfor %}
        </table>
        <a href = "/" class = "btn">Back to Home</a>
    </div>
</body>
</html>
