<!DOCTYPE html>
<html lang = "en">
<head>
    <meta charset = "UTF-8">
    <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
    <title>Reservation</title>
    <link href = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel = "stylesheet">
    <style>
        body {
            background-color: #f5f0e1;
            color: #4b3621;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        h1 {
            margin-bottom: 30px;
            margin-top: 50px;
            text-align: center;
        }
        /*stacks reservation options for easier reading*/
        form {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
        }
        
        .form-control, .btn {
            margin-bottom: 15px;
            border-radius: 8px;
        }

        .btn {
            background-color: #4b3621;
            color: #f5f0e1;
            border: none;
            padding: 10px 20px;
            font-size: 1.1rem;
        }

        .btn:hover {
            background-color: #6b4f31;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <h1>Panther Hotel Room Reservation</h1>
    <!--Creates a form with options for user to fill out or select from-->
    <form method = "post">
        <input class = "form-control" name = "name" placeholder = "Name" required>
        <input class = "form-control" type = "date" name = "checkin_date" required>
        <input class = "form-control" type = "date" name = "checkout_date" required>
        <select class = "form-control" name = "room_type">
            <option>Single</option>
            <option>Double</option>
            <option>Suite</option>
        </select>
        <button class = "btn">Submit</button>
    </form>
</body>
</html>
